# docker-compose.yml.template
# Harness base compose template. Merged and generated by libs/compose.sh
# (compose_generate) on every run — never written to SANDBOX_DIR.
#
# {{VAR}} placeholders are substituted at generation time:
#   {{PROJECT_NAME}}       → project name
#   {{SANDBOX_IMAGE_NAME}} → capability layer image name
#   {{AGENT_IMAGE_NAME}}   → reasoning layer image name
#   {{PROVIDER_NAME}}      → provider name (e.g. hermes, opencode)
#
# ${VAR} placeholders are preserved for Docker Compose to resolve at runtime
# from the exported environment (.env path variables and secrets).
#
# Container names match image names — one session per project at a time.
# Start/stop is managed by scripts/start_agent.sh via docker compose up/down.
# Do not invoke this file directly in normal operation.
#
# Session labels are defined once as a YAML anchor (&session_labels) and
# referenced by all services (sandbox, agent, and any future sidecars).
# This ensures consistent lifecycle management across all containers.

# Session labels — applied to ALL containers for unified lifecycle management.
# Referenced via *session_labels anchor in each service.
x-session-labels: &session_labels
  agent-sandbox.project-dir: {{PROJECT_DIR}}
  agent-sandbox.session-ts: {{SESSION_TS}}
  agent-sandbox.host-branch: {{SANITIZED_HOST_BRANCH}}

services:
  sandbox:
    image: {{SANDBOX_IMAGE_NAME}}
    container_name: {{SANDBOX_CONTAINER_NAME}}
    labels: *session_labels
    volumes:
      - type: bind
        source: ${SNAPSHOT_DIR}
        target: /home/agentuser/.snapshot
        read_only: true
      - type: bind
        source: ${CHANGES_DIR}
        target: /home/agentuser/workspace/session-diffs
    environment:
      - SNAPSHOT_DIR_NAME=.snapshot
      - SANDBOX_DIR_NAME=sandbox
      - CHANGES_DIR_NAME=workspace/session-diffs
      - AUTOSAVE_INTERVAL=${AUTOSAVE_INTERVAL:-60}
      - SESSION_TS=${SESSION_TS:-}
      - SANITIZED_HOST_BRANCH=${SANITIZED_HOST_BRANCH:-}
    healthcheck:
      test: ["CMD", "test", "-d", "/home/agentuser/sandbox/.git"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    restart: "no"

  agent:
    image: {{AGENT_IMAGE_NAME}}
    container_name: {{AGENT_CONTAINER_NAME}}
    labels: *session_labels
    depends_on:
      sandbox:
        condition: service_healthy
    volumes_from:
      - sandbox
    volumes:
      - type: bind
        source: ${INPUT_DIR}
        target: /home/agentuser/workspace/input
        read_only: true
      - type: bind
        source: ${OUTPUT_DIR}
        target: /home/agentuser/workspace/output
      - type: bind
        source: ${SANDBOX_DIR}/.{{PROVIDER_NAME}}
        target: /opt/provider-config
    environment:
      - INPUT_DIR_NAME=workspace/input
      - OUTPUT_DIR_NAME=workspace/output
      - SANDBOX_DIR_NAME=sandbox
    stdin_open: true
    tty: true
    restart: "no"
