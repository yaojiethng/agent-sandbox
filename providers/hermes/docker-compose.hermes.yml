# providers/hermes/docker-compose.hermes.yml
# Provider overlay for the Hermes provider. Applied in all modes (standard and serve).
# Merged by scripts/run_agent.sh before the mode overlay.
#
# HERMES_CONFIG_FILE and HERMES_ENV_FILE are exported by providers/hermes/setup.sh
# before compose generation, and resolved by Docker Compose at runtime.

services:
  agent:
    environment:
      - HERMES_HOME=/home/agentuser/.hermes
      - ANTHROPIC_TOKEN=${ANTHROPIC_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_MAX_ITERATIONS=${HERMES_MAX_ITERATIONS}
    volumes:
      - type: bind
        source: ${HERMES_CONFIG_FILE}
        target: /home/agentuser/.hermes/config.yaml
      - type: bind
        source: ${HERMES_ENV_FILE}
        target: /home/agentuser/.hermes/.env
