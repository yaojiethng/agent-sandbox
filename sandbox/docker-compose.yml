# docker-compose.yml
# Dogfood compose file for the agent-sandbox project itself.
# Lives in SANDBOX_DIR (sibling to the project repo, not committed to it).
#
# Runtime variables are written to .env in SANDBOX_DIR by start_agent.sh
# before each session. Do not commit .env.
#
# Image naming convention (derived by start_agent.sh, written to .env):
#   capability layer: agent-sandbox-{{PROJECT_NAME}}
#   reasoning layer:  opencode-agent-{{PROJECT_NAME}}
#
# Image names are never hardcoded here — always sourced from .env so that
# the single definition in start_agent.sh is the only place they exist.
#
# Start/stop is managed by start_agent.sh via docker compose up/down.
# Do not invoke this file directly in normal operation.

services:
  sandbox:
    image: ${SANDBOX_IMAGE_NAME}
    container_name: ${SANDBOX_IMAGE_NAME}
    volumes:
      - ${SNAPSHOT_DIR}:/home/agentuser/.snapshot:ro
      - ${CHANGES_DIR}:/home/agentuser/workspace/changes:rw
    environment:
      - SNAPSHOT_DIR_NAME=.snapshot
      - SANDBOX_DIR_NAME=sandbox
      - CHANGES_DIR_NAME=workspace/changes
      - AUTOSAVE_INTERVAL=${AUTOSAVE_INTERVAL:-60}
    healthcheck:
      test: ["CMD", "test", "-d", "/home/agentuser/sandbox/.git"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    restart: "no"

  agent:
    image: ${AGENT_IMAGE_NAME}
    container_name: ${AGENT_IMAGE_NAME}
    depends_on:
      sandbox:
        condition: service_healthy
    volumes_from:
      - sandbox
    volumes:
      - ${INPUT_DIR}:/home/agentuser/workspace/input:ro
      - ${OUTPUT_DIR}:/home/agentuser/workspace/output:rw
    environment:
      - INPUT_DIR_NAME=workspace/input
      - OUTPUT_DIR_NAME=workspace/output
      - SANDBOX_DIR_NAME=sandbox
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
    stdin_open: true
    tty: true
    restart: "no"
