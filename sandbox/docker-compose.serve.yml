# docker-compose.serve.yml
# Overlay for serve mode. Apply on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.serve.yml up
#
# Adds port binding and serve subcommand to the agent service.
# SERVE_PORT is read from .env (default 46553).

services:
  agent:
    command: ["serve", "--hostname", "0.0.0.0", "--port", "${SERVE_PORT:-46553}"]
    ports:
      - "127.0.0.1:${SERVE_PORT:-46553}:${SERVE_PORT:-46553}"
